name: Fetch FII / DII Data

# NSE publishes FII/DII data after ~19:00 IST.
# Recommended cron-job.org schedule:
#   Daily on weekdays at 19:30 IST (14:00 UTC).
#
# cron-job.org webhook → POST to:
#   https://api.github.com/repos/<owner>/<repo>/actions/workflows/fetch_fii_dii.yaml/dispatches
# Body: {"ref": "main"}
# Header: Authorization: Bearer <GITHUB_PAT>

on:
  workflow_dispatch:

jobs:
  fetch-fii-dii:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch FII / DII
        run: python scripts/fetch_fii_dii.py

      - name: Commit and push
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add fiiDiiData/
          git commit -m "FII/DII update $(date -u '+%Y-%m-%d')" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
