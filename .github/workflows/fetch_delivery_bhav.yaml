name: Fetch Delivery % (NSE Bhav Copy)

# NSE publishes Bhav copy after ~19:00 IST.
# Run once daily at 19:30 IST (14:00 UTC) on weekdays.
#
# cron-job.org webhook -> POST:
#   https://api.github.com/repos/<owner>/<repo>/actions/workflows/fetch_delivery_bhav.yaml/dispatches
# Body:   {"ref": "main"}
# Header: Authorization: Bearer <GITHUB_PAT>
# Schedule: Daily 14:00 UTC, Mon-Fri

on:
  workflow_dispatch:

jobs:
  fetch-delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch NSE Bhav Copy & extract delivery %
        run: python scripts/fetch_delivery_bhav.py

      - name: Commit and push
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deliveryData/
          git commit -m "Delivery % update $(date -u '+%Y-%m-%d')" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
